  - path: "artifacts/balloon-carnival/public/images/exhibition-2.png"
    description: "Beautiful balloon archway tunnel with fairy lights, magical carnival setting"
    aspect_ratio: "4:3"
  - path: "artifacts/balloon-carnival/public/images/carnival-pattern.png"
    description: "Abstract geometric seamless pattern with carnival themes, confetti, tents, and balloons, soft warm colors"
