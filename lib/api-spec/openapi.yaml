      type: object
      required: [ticketType, label, ticketsSold, revenue, percentage]
      properties:
        ticketType:
          type: string
          description: Stored ticket_type value (e.g. "single", "combo"). Empty string for legacy rows with no ticket type.
        label:
          type: string
          description: Human-readable label (e.g. "單日票", "兩日套票", "未指定").
        ticketsSold:
          type: number
        revenue:
          type: number
        percentage:
          type: number

    SessionAvailability:
      type: object
      required: [eventDate, label, totalCapacity, registered, paid, remaining, fillPercentage]
      properties:
        eventDate:
          type: string
          format: date
        label:
          type: string
        totalCapacity:
          type: number
        registered:
          type: number
          description: All non-failed registrations for this session (includes unpaid reservations holding a seat).
        paid:
          type: number
          description: Tickets with paymentStatus = 'paid' for this session.
        remaining:
          type: number
        fillPercentage:
          type: number

    SalesOverview:
      type: object
      required:
        - ticketPriceTwd
        - todayTicketsSold
        - todayRevenue
        - totalTicketsSold
        - totalRevenue
        - totalCapacity
        - overallFillPercentage
        - dailySalesTrend
        - ticketTypeBreakdown
        - sessionAvailability
        - carnivalSales
        - tournamentSales
      properties:
        ticketPriceTwd:
          type: number
          description: Reference single-day ticket price in TWD (for display only; revenue is summed from registration.amount).
        todayTicketsSold:
          type: number
          description: Paid tickets created today (by createdAt date in Asia/Taipei).
        todayRevenue:
          type: number
          description: Revenue from paid registrations created today (sum of registration.amount).
        totalTicketsSold:
          type: number
          description: Cumulative paid ticket count.
        totalRevenue:
          type: number
          description: Cumulative revenue from paid registrations (sum of registration.amount).
        totalCapacity:
          type: number
        overallFillPercentage:
          type: number
        dailySalesTrend:
          type: array
          description: Daily ticket sales (grouped by createdAt) for the last 14 days.
          items:
            $ref: '#/components/schemas/SalesTrendPoint'
        ticketTypeBreakdown:
          type: array
          description: Ticket distribution across event sessions (each event date is a ticket type).
          items:
            $ref: '#/components/schemas/TicketTypeBreakdown'
        sessionAvailability:
          type: array
          description: Per-session capacity / remaining seats.
          items:
            $ref: '#/components/schemas/SessionAvailability'
        carnivalSales:
          $ref: '#/components/schemas/CategorySales'
        tournamentSales:
          $ref: '#/components/schemas/CategorySales'
    CategorySales:
      type: object
      required:
        - revenue
        - payerCount
      properties:
        revenue:
          type: number
          description: Cumulative paid revenue for this category (sum of registration.amount).
        payerCount:
          type: number
          description: Number of distinct paying people (distinct paymentRef among paid rows), not ticket count.
